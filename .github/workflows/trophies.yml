name: Generate Trophies

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch trophies SVG
        run: |
          curl -s "https://github-profile-trophy.vercel.app/?username=Ledian63S&theme=transparent&no-bg=true&no-frame=true&column=6" -o res/trophies.svg
          if ! grep -q "<svg" res/trophies.svg; then
            echo "Failed to fetch valid SVG"
            exit 1
          fi

      - name: Commit trophies
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add res/trophies.svg
          git diff --staged --quiet || git commit -m "Update trophies"
          git push
